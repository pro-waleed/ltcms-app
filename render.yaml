databases:
  - name: ltcms-db
    plan: starter
    databaseName: ltcms
    user: ltcms

services:
  - type: web
    name: ltcms-app
    runtime: docker
    plan: starter
    healthCheckPath: /up
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        value: https://ltcms-app.onrender.com
      - key: APP_KEY
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: ltcms-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: ltcms-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: ltcms-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: ltcms-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: ltcms-db
          property: password
      - key: DB_URL
        fromDatabase:
          name: ltcms-db
          property: connectionString
      - key: DB_SSLMODE
        value: require
      - key: SESSION_DRIVER
        value: cookie
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: SESSION_ENCRYPT
        value: "true"
